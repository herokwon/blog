openapi: 3.0.3
info:
  title: Blog API
  version: 0.2.1
  description: API specification for blog posts and image management

tags:
  - name: Posts
    description: Operations for managing blog posts
  - name: Images
    description: Operations for uploading and retrieving images

paths:
  /api/posts:
    get:
      summary: Get list of posts
      operationId: listPosts
      responses:
        200:
          $ref: '#/components/responses/PostList'
        500:
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a post
      operationId: createPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
            example:
              $ref: '#/components/examples/PostInputExample'
      responses:
        201:
          $ref: '#/components/responses/SinglePost'
        400:
          $ref: '#/components/responses/BadRequest'
        500:
          $ref: '#/components/responses/InternalServerError'

  /api/posts/{postId}:
    parameters:
      - $ref: '#/components/parameters/PostIdParam'

    get:
      summary: Get post by id
      operationId: getPostById
      responses:
        200:
          $ref: '#/components/responses/SinglePost'
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'
        500:
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update post by id
      operationId: updatePostById
      responses:
        200:
          $ref: '#/components/responses/SinglePost'
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'
        500:
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete post by id
      operationId: deletePostById
      responses:
        200:
          $ref: '#/components/responses/SinglePost'
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'
        500:
          $ref: '#/components/responses/InternalServerError'

  /api/images:
    post:
      summary: Upload an image
      operationId: uploadImage
      description: |
        Upload an image file to R2 storage. The image will be stored with a unique
        UUID-based filename and returned with a URL for future retrieval.

        **Authentication Required**: Admin role

        **Constraints**:
        - Maximum file size: 10MB
        - Allowed types: PNG, JPEG, GIF, WebP
      tags:
        - Images
      security:
        - sessionAuth: []
      requestBody:
        $ref: '#/components/requestBodies/ImageUpload'
      responses:
        201:
          $ref: '#/components/responses/ImageUploadSuccess'
        400:
          $ref: '#/components/responses/ImageBadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        500:
          $ref: '#/components/responses/ImageInternalServerError'

  /api/images/{path}:
    parameters:
      - $ref: '#/components/parameters/ImagePathParam'
      - $ref: '#/components/parameters/IfNoneMatchHeader'

    get:
      summary: Retrieve an image
      operationId: getImage
      description: |
        Retrieve an image file from R2 storage by its full storage key.

        **No Authentication Required**: Publicly accessible

        **Caching**: This endpoint supports conditional requests using ETags.
        If the `If-None-Match` header matches the current ETag, a 304 response
        is returned with no body. Images are cached with a 1-year max-age.

        **Error Format Note**: Unlike other API endpoints, errors from this endpoint
        return SvelteKit error pages (HTML), not JSON API format.
      tags:
        - Images
      responses:
        200:
          $ref: '#/components/responses/ImageBinaryResponse'
        304:
          $ref: '#/components/responses/ImageNotModified'
        400:
          description: |
            Image path is missing or invalid.

            **Note**: Returns HTML error page, not JSON.
        404:
          description: |
            Image not found in R2 storage.

            **Note**: Returns HTML error page, not JSON.
        500:
          description: |
            R2 bucket binding not configured.

            **Note**: Returns HTML error page, not JSON.

components:
  schemas:
    Post:
      allOf:
        - $ref: '#/components/schemas/PostInput'
        - type: object
          description: Schema for a post
          additionalProperties: false
          required:
            - id
            - created_at
            - updated_at
          properties:
            id:
              type: string
              description: The unique identifier for the post
              format: uuid
              example: 4e9344a8-b642-47fb-8e8b-b0f1343f77df
            created_at:
              type: string
              description: Post creation time
              format: date-time
              example: '2026-01-01T12:00:00Z'
            updated_at:
              type: string
              description: Post last update time
              format: date-time
              example: '2026-12-31T12:00:00Z'

    PostInput:
      type: object
      description: Schema for post input when creating or updating a post
      additionalProperties: false
      required:
        - title
        - content
      properties:
        title:
          type: string
          description: Post title
          example: My First Post
        content:
          type: string
          description: Post content
          example: This is the content of my first blog

    ApiSuccessResponse:
      type: object
      description: Schema for successful API responses
      additionalProperties: false
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          description: Should always be true for successful responses
          enum: [true]
          example: true
        data:
          oneOf:
            - $ref: '#/components/schemas/Post'
            - $ref: '#/components/schemas/ImageUploadData'
            - type: array
              description: The list of posts returned in the response
              items:
                $ref: '#/components/schemas/Post'
          nullable: true
        error:
          description: Should always be null for successful responses
          enum: [null]
          nullable: true

    ApiErrorResponse:
      type: object
      description: Schema for error API responses
      additionalProperties: false
      required:
        - success
        - data
        - error
      properties:
        success:
          type: boolean
          description: Should always be false for error responses
          enum: [false]
          example: false
        data:
          description: Should always be null for error responses
          enum: [null]
          nullable: true
        error:
          type: object
          description: Error details for the response
          $ref: '#/components/schemas/ApiError'

    ApiError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - details
      properties:
        code:
          type: string
          description: A machine-readable error code
          example: POST_NOT_FOUND
        message:
          type: string
          description: A human-readable message describing the error
          example: Post not found
        details:
          oneOf:
            - $ref: '#/components/schemas/InvalidFieldsErrorDetails'
            - $ref: '#/components/schemas/DatabaseErrorDetails'
            - $ref: '#/components/schemas/PostNotFoundErrorDetails'
            - $ref: '#/components/schemas/FileValidationErrorDetails'
            - $ref: '#/components/schemas/R2BindingErrorDetails'
            - $ref: '#/components/schemas/UnauthorizedErrorDetails'
          nullable: true

    InvalidFieldsErrorDetails:
      type: object
      additionalProperties: false
      required:
        - title
        - content
      properties:
        title:
          type: string
          description: Validation result for the "title" field (e.g. "missing", "invalid type", etc.)
          nullable: true
          example: missing
        content:
          type: string
          description: Validation result for the "content" field (e.g. "missing", "invalid type", etc.)
          nullable: true
          example: null

    DatabaseErrorDetails:
      type: object
      additionalProperties: false
      required:
        - resource
        - hint
      properties:
        resource:
          type: string
          description: The name of the missing database resource
          example: BLOG_DB
        hint:
          type: string
          description: A hint to help resolve the database configuration issue
          example: Please check your wrangler config file or environment variables

    PostNotFoundErrorDetails:
      type: object
      additionalProperties: false
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: The id of the resource that was not found
          example: 4e9344a8-b642-47fb-8e8b-b0f1343f77df

    ImageUploadData:
      type: object
      description: Schema for image upload response data
      additionalProperties: false
      required:
        - key
        - url
      properties:
        key:
          type: string
          description: The R2 storage key for the uploaded image
          example: posts/images/4e9344a8-b642-47fb-8e8b-b0f1343f77df.png
        url:
          type: string
          description: The URL path to access the uploaded image
          format: uri-reference
          example: /api/images/posts/images/4e9344a8-b642-47fb-8e8b-b0f1343f77df.png

    FileValidationErrorDetails:
      type: object
      description: Error details for file validation failures
      additionalProperties: false
      required:
        - fileType
        - allowedTypes
        - maxSizeMB
        - actualSizeMB
      properties:
        fileType:
          type: string
          description: The MIME type of the rejected file
          nullable: true
          example: image/bmp
        allowedTypes:
          type: array
          description: List of allowed MIME types
          items:
            type: string
          nullable: true
          example: ['image/png', 'image/jpeg', 'image/gif', 'image/webp']
        maxSizeMB:
          type: number
          description: Maximum allowed file size in megabytes
          nullable: true
          example: 10
        actualSizeMB:
          type: number
          description: Actual file size in megabytes
          nullable: true
          example: 15.42

    R2BindingErrorDetails:
      type: object
      description: Error details for missing R2 bucket binding
      additionalProperties: false
      required:
        - resource
        - hint
      properties:
        resource:
          type: string
          description: The name of the missing R2 resource
          example: BLOG_BUCKET
        hint:
          type: string
          description: A hint to help resolve the configuration issue
          example: Please check your wrangler config file or environment variables

    UnauthorizedErrorDetails:
      type: object
      description: Error details for unauthorized access
      additionalProperties: false
      properties:
        requiredRole:
          type: string
          description: The role required to perform this action
          example: admin
          nullable: true

  parameters:
    PostIdParam:
      name: postId
      in: path
      description: The unique identifier of a post
      required: true
      schema:
        type: string
        format: uuid

    ImagePathParam:
      name: path
      in: path
      description: |
        The full R2 storage key for the image (e.g., 'posts/images/uuid.png').
        This is a catch-all parameter that captures the entire path including slashes.
      required: true
      schema:
        type: string
        pattern: '^[a-zA-Z0-9/_.-]+$'
      example: posts/images/4e9344a8-b642-47fb-8e8b-b0f1343f77df.png

    IfNoneMatchHeader:
      name: If-None-Match
      in: header
      description: ETag value from a previous response for conditional requests
      required: false
      schema:
        type: string
      example: '"abc123etag"'

  requestBodies:
    ImageUpload:
      description: Multipart form data for image upload
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - file
            properties:
              file:
                type: string
                format: binary
                description: |
                  Image file to upload. Must be one of: PNG, JPEG, GIF, or WebP.
                  Maximum file size: 10MB.
          encoding:
            file:
              contentType: image/png, image/jpeg, image/gif, image/webp

  responses:
    SinglePost:
      description: The response returned a post
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiSuccessResponse'
          examples:
            created:
              $ref: '#/components/examples/PostCreatedExample'
            retrieved:
              $ref: '#/components/examples/PostResponseExample'
            updated:
              $ref: '#/components/examples/PostResponseExample'
            deleted:
              $ref: '#/components/examples/EmptyResponseExample'

    PostList:
      description: The response returned a list of posts
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiSuccessResponse'
          examples:
            default:
              $ref: '#/components/examples/PostListExample'

    BadRequest:
      description: The request was invalid (e.g. missing required fields, invalid JSON)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            missingId:
              $ref: '#/components/examples/MissingIdErrorExample'
            invalidJson:
              $ref: '#/components/examples/InvalidJsonErrorExample'
            invalidFields:
              $ref: '#/components/examples/InvalidFieldErrorExample'

    NotFound:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/PostNotFoundErrorExample'

    InternalServerError:
      description: An unexpected error occurred on the server
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            databaseBindingMissing:
              $ref: '#/components/examples/DatabaseErrorExample'
            serverError:
              $ref: '#/components/examples/ServerErrorExample'

    ImageUploadSuccess:
      description: Image uploaded successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiSuccessResponse'
          examples:
            success:
              $ref: '#/components/examples/ImageUploadSuccessExample'

    ImageBinaryResponse:
      description: Image file binary data with caching headers
      headers:
        Content-Type:
          description: MIME type of the image
          schema:
            type: string
            enum:
              - image/png
              - image/jpeg
              - image/gif
              - image/webp
              - application/octet-stream
          example: image/png
        Cache-Control:
          description: Cache directive for CDN and browser caching
          schema:
            type: string
          example: 'public, max-age=31536000, s-maxage=31536000, immutable'
        ETag:
          description: Entity tag for cache validation
          schema:
            type: string
          example: '"abc123etag"'
      content:
        image/*:
          schema:
            type: string
            format: binary

    ImageNotModified:
      description: Image not modified (ETag matches)
      headers:
        ETag:
          description: Entity tag matching the If-None-Match request header
          schema:
            type: string
          example: '"abc123etag"'

    Unauthorized:
      description: User is not authenticated or lacks admin privileges
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            notLoggedIn:
              $ref: '#/components/examples/UnauthorizedErrorExample'

    ImageBadRequest:
      description: Invalid request (missing file, wrong type, or too large)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            missingFile:
              $ref: '#/components/examples/MissingFileErrorExample'
            invalidFileType:
              $ref: '#/components/examples/InvalidFileTypeErrorExample'
            fileTooLarge:
              $ref: '#/components/examples/FileTooLargeErrorExample'
            invalidFormData:
              $ref: '#/components/examples/InvalidFormDataErrorExample'

    ImageInternalServerError:
      description: Server configuration error or R2 storage error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            r2BindingMissing:
              $ref: '#/components/examples/R2BindingErrorExample'
            r2UploadFailed:
              $ref: '#/components/examples/R2UploadErrorExample'

  examples:
    PostInputExample:
      summary: An example of post input for creating or updating a post
      value:
        title: My First Post
        content: This is the content of my first blog

    PostResponseExample:
      summary: An example of a post returned response
      value:
        status: 200
        statusText: OK
        success: true
        data:
          id: 4e9344a8-b642-47fb-8e8b-b0f1343f77df
          title: My First Post
          content: This is the content of my first blog
          created_at: '2026-01-01T12:00:00Z'
          updated_at: '2026-12-31T12:00:00Z'
        error: null

    PostCreatedExample:
      summary: An example of a post created response
      value:
        status: 201
        statusText: Created
        success: true
        data:
          id: 4e9344a8-b642-47fb-8e8b-b0f1343f77df
          title: My First Post
          content: This is the content of my first blog
          created_at: '2026-01-01T12:00:00Z'
          updated_at: '2026-01-01T12:00:00Z'
        error: null

    EmptyResponseExample:
      summary: An example of an empty response
      value:
        status: 200
        statusText: OK
        success: true
        data: null
        error: null

    PostListExample:
      summary: An example of a list of posts
      value:
        status: 200
        statusText: OK
        success: true
        data:
          - id: 4e9344a8-b642-47fb-8e8b-b0f1343f77df
            title: My First Post
            content: This is the content of my first blog
            created_at: '2026-01-01T12:00:00Z'
            updated_at: '2026-12-31T12:00:00Z'
          - id: 5f9344a8-b642-47fb-8e8b-b0f1343f77df
            title: My Second Post
            content: This is the content of my second blog
            created_at: '2026-02-01T12:00:00Z'
            updated_at: '2026-12-30T12:00:00Z'
        error: null

    MissingIdErrorExample:
      summary: An example of missing id error response
      value:
        status: 400
        statusText: Bad Request
        success: false
        data: null
        error:
          code: INVALID_REQUEST
          message: Post id is required
          details: null

    InvalidJsonErrorExample:
      summary: An example of invalid JSON error response
      value:
        status: 400
        statusText: Bad Request
        success: false
        data: null
        error:
          code: INVALID_REQUEST
          message: Request body must be a valid JSON object
          details: null

    InvalidFieldErrorExample:
      summary: An example of invalid fields error response
      value:
        status: 400
        statusText: Bad Request
        success: false
        data: null
        error:
          code: INVALID_REQUEST
          message: Request body must be a JSON object with string properties "title" and "content"
          details:
            title: missing
            content: null

    DatabaseErrorExample:
      summary: An example of database binding missing error response
      value:
        status: 500
        statusText: Internal Server Error
        success: false
        data: null
        error:
          code: DATABASE_BINDING_MISSING
          message: The server is not configured correctly
          details:
            resource: BLOG_DB
            hint: Please check your wrangler config file or environment variables

    PostNotFoundErrorExample:
      summary: An example of post not found error response
      value:
        status: 404
        statusText: Not Found
        success: false
        data: null
        error:
          code: POST_NOT_FOUND
          message: Post not found
          details:
            id: 4e9344a8-b642-47fb-8e8b-b0f1343f77df

    ServerErrorExample:
      summary: An example of an unknown server error response
      value:
        status: 500
        statusText: Internal Server Error
        success: false
        data: null
        error:
          code: SERVER_ERROR
          message: An unknown error occurred on the server
          details: null

    ImageUploadSuccessExample:
      summary: Image uploaded successfully
      value:
        status: 201
        statusText: Created
        success: true
        data:
          key: posts/images/4e9344a8-b642-47fb-8e8b-b0f1343f77df.png
          url: /api/images/posts/images/4e9344a8-b642-47fb-8e8b-b0f1343f77df.png
        error: null

    UnauthorizedErrorExample:
      summary: User not authorized to upload images
      value:
        status: 401
        statusText: Unauthorized
        success: false
        data: null
        error:
          code: UNAUTHORIZED
          message: You must be logged in as an admin to upload images
          details: null

    MissingFileErrorExample:
      summary: File field missing from request
      value:
        status: 400
        statusText: Bad Request
        success: false
        data: null
        error:
          code: INVALID_REQUEST
          message: Request must include a file in the "file" field
          details: null

    InvalidFileTypeErrorExample:
      summary: File type not allowed
      value:
        status: 400
        statusText: Bad Request
        success: false
        data: null
        error:
          code: INVALID_FILE_TYPE
          message: 'File type "image/bmp" is not allowed. Allowed types: image/png, image/jpeg, image/gif, image/webp'
          details:
            fileType: image/bmp
            allowedTypes: ['image/png', 'image/jpeg', 'image/gif', 'image/webp']
            maxSizeMB: null
            actualSizeMB: null

    FileTooLargeErrorExample:
      summary: File exceeds maximum size
      value:
        status: 400
        statusText: Bad Request
        success: false
        data: null
        error:
          code: FILE_TOO_LARGE
          message: File size (15.42MB) exceeds the maximum allowed size of 10MB
          details:
            fileType: null
            allowedTypes: null
            maxSizeMB: 10
            actualSizeMB: 15.42

    InvalidFormDataErrorExample:
      summary: Request body is not valid multipart/form-data
      value:
        status: 400
        statusText: Bad Request
        success: false
        data: null
        error:
          code: INVALID_REQUEST
          message: Request body must be valid multipart/form-data
          details: null

    R2BindingErrorExample:
      summary: R2 bucket binding not configured
      value:
        status: 500
        statusText: Internal Server Error
        success: false
        data: null
        error:
          code: R2_BINDING_MISSING
          message: The server is not configured correctly
          details:
            resource: BLOG_BUCKET
            hint: Please check your wrangler config file or environment variables

    R2UploadErrorExample:
      summary: R2 upload operation failed
      value:
        status: 500
        statusText: Internal Server Error
        success: false
        data: null
        error:
          code: SERVER_ERROR
          message: Failed to upload image to R2 storage
          details: null

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session_id
      description: |
        Session-based authentication using HTTP-only cookies.
        Only users with the 'admin' role can access protected endpoints.
        Sessions are validated server-side on each request.
