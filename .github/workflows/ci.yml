name: ✅ CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || !github.event.pull_request.draft
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Run lint
        run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || !github.event.pull_request.draft
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Check types
        run: pnpm check

  tests:
    name: Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || !github.event.pull_request.draft
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Playwright browser caching note
        run: |
          echo "Playwright: do not cache browser binaries; restoring cache can be as slow as downloading them."
          echo "See: https://playwright.dev/docs/ci#caching-browsers"

      - name: Install playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || !github.event.pull_request.draft
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Run build
        run: pnpm build
