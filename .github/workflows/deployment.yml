name: 🚀 Deployment

on:
  push:
    branches:
      - main
      - 'release/*'
      - 'dependabot/**'
      - '*update*deps*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_REPO: ${{ github.repository }}
  GH_TOKEN: ${{ github.token }}
  CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  DEPLOYMENT_ENV: ${{ github.ref_name == 'main' && github.actor != 'dependabot[bot]' && 'Production' || 'Preview' }}

jobs:
  deploy-worker:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: deploy-worker-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
    outputs:
      result: ${{ steps.deploy.outcome }}
      url: ${{ steps.deployment-url.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Build
        run: pnpm build

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          packageManager: pnpm
          command: ${{ env.DEPLOYMENT_ENV == 'Production' && 'deploy' || 'versions upload' }}
        continue-on-error: true

      - name: Get deployment url
        id: deployment-url
        if: steps.deploy.outcome == 'success'
        env:
          RAW_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          RAW_URL="${RAW_URL:-}"
          workerUrl=""

          if [ -n "$RAW_URL" ]; then
            cleanDomain=$(
              echo "$RAW_URL" |
              sed -E 's/\([^)]*\)//g' |
              awk -F'[,;[:space:]]+' '{print $1}' |
              xargs
            )
            if [ -n "$cleanDomain" ]; then
              [[ ! "$cleanDomain" =~ ^https?:// ]] && workerUrl="https://$cleanDomain" || workerUrl="$cleanDomain"
            fi
          fi

          echo "result=$workerUrl" >> "$GITHUB_OUTPUT"

  extract-metadata:
    name: Extract Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr: ${{ steps.pr.outputs.result }}
    steps:
      - name: Get associated pull request
        id: pr
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          PR_NUMBER=$(gh api "repos/$GH_REPO/commits/$COMMIT_SHA/pulls" \
            --jq '.[0].number // empty')

          if [ -n "$PR_NUMBER" ]; then
            PR_INFO=$(gh api "repos/$GH_REPO/pulls/$PR_NUMBER" \
              --jq '{
                number: .number,
                title: .title,
                url: .html_url,
                commit: .head.sha,
                commit_short: (.head.sha[0:7]),
                author: .user.login,
                author_url: .user.html_url,
                avatar_url: .user.avatar_url
              }')
          else
            echo "No associated PR found."
            PR_INFO=""
          fi

          {
            echo "result<<EOF"
            echo "$PR_INFO"
            echo "EOF"
          } >> $GITHUB_OUTPUT

  deploy-github:
    name: Deploy to GitHub
    runs-on: ubuntu-latest
    needs: [deploy-worker]
    timeout-minutes: 10
    permissions:
      deployments: write
    steps:
      - name: Create deployment
        id: create-deployment
        env:
          REF: ${{ github.sha }}
        run: |
          DEPLOYMENT_ID=$(gh api repos/$GH_REPO/deployments \
            --method POST \
            --header "Accept: application/vnd.github+json" \
            --input - \
            -q '.id' <<EOF
          {
            "ref": "$REF",
            "environment": "$DEPLOYMENT_ENV",
            "auto_merge": false,
            "required_contexts": []
          }
          EOF
          )

          echo "deploy-id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

      - name: Conclude deployment
        env:
          DEPLOYMENT_ID: ${{ steps.create-deployment.outputs.deploy-id }}
          DEPLOYMENT_STATE: ${{ needs.deploy-worker.outputs.result == 'success' && 'success' || 'failure' }}
          DEPLOYMENT_URL: ${{ needs.deploy-worker.outputs.url }}
        run: |
          gh api repos/$GH_REPO/deployments/$DEPLOYMENT_ID/statuses \
            -F state="$DEPLOYMENT_STATE" \
            -F environment=$DEPLOYMENT_ENV \
            -F environment_url=$DEPLOYMENT_URL

  comment-pr:
    name: Comment on Pull Request
    runs-on: ubuntu-latest
    needs: [deploy-worker, extract-metadata]
    if: needs.extract-metadata.outputs.pr != ''
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Comment deployment result on PR
        env:
          DEPLOYED: ${{ needs.deploy-worker.outputs.result == 'success' }}
          DEPLOYMENT_URL: ${{ needs.deploy-worker.outputs.url }}
          CF_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ vars.WORKER_NAME }}
          PR_JSON: ${{ needs.extract-metadata.outputs.pr }}
          RUN_ID: ${{ github.run_id }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number // empty')
          PR_COMMIT=$(echo "$PR_JSON" | jq -r '.commit // empty')
          PR_COMMIT_SHORT=$(echo "$PR_JSON" | jq -r '.commit_short // empty')
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.title // empty')
          PR_URL=$(echo "$PR_JSON" | jq -r '.url // empty')
          AUTHOR=$(echo "$PR_JSON" | jq -r '.author // empty')
          AUTHOR_URL=$(echo "$PR_JSON" | jq -r '.author_url // empty')
          AVATAR_URL=$(echo "$PR_JSON" | jq -r '.avatar_url // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No pull request found."
            exit 0
          fi

          STATUS_CELL=":x: Failed"
          [ "$DEPLOYED" = "true" ] && STATUS_CELL=":white_check_mark: Success"

          BODY="### ⚡ Deploying with Cloudflare Workers

          | **Status** | ${STATUS_CELL}! |
          | :--- | :--- |
          | **Environment** | ${DEPLOYMENT_ENV} |"

          [ -n "$PR_TITLE" ] && BODY="${BODY}
          | **Pull Request** | [\`${PR_TITLE}\`](${PR_URL}) |"

          [ -n "$PR_COMMIT" ] && BODY="${BODY}
          | **Commit** | [\`${PR_COMMIT_SHORT}\`](https://github.com/${GH_REPO}/commit/${PR_COMMIT}) |"

          [ -n "$DEPLOYMENT_URL" ] && BODY="${BODY}
          | **URL** | ${DEPLOYMENT_URL} |"

          [ -n "$AUTHOR" ] && BODY="${BODY}
          | **Author** | <img src=\"${AVATAR_URL}\" alt=\"avatar\" width=\"16\" height=\"16\" /> [${AUTHOR}](${AUTHOR_URL}) |"

          BODY="${BODY}
          | **Details** | :arrow_right: [GitHub Actions](https://github.com/${GH_REPO}/actions/runs/${RUN_ID}) <br /> :arrow_right: [Cloudflare Dashboard](https://dash.cloudflare.com/${CF_ACCOUNT_ID}/workers/services/view/${CF_WORKER_NAME}/production/deployments) |"

          gh pr comment "$PR_NUMBER" \
            --repo "$GH_REPO" \
            --body "$BODY"

  release-github:
    name: Release on GitHub
    runs-on: ubuntu-latest
    needs: [deploy-worker, extract-metadata]
    if: |
      needs.deploy-worker.outputs.result == 'success' &&
      github.ref_name == 'main' &&
      github.actor != 'dependabot[bot]'
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          sparse-checkout: package.json
          sparse-checkout-cone-mode: false

      - name: Get current version
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check tag existence
        id: tag
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          git fetch --tags --force

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "⚠️ Tag v$VERSION already exists. Skipping release."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Tag v$VERSION is new. Proceeding..."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --target main \
            --title "v$VERSION" \
            --generate-notes
